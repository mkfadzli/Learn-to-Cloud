name: Playwright tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  playwright-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies and Playwright browsers
        run: |
          npm ci
          npx playwright install --with-deps

      - name: Build and serve site
        run: |
          npm run build
          nohup npm run serve >/dev/null 2>&1 &
        shell: bash

      - name: Wait for site
        run: |
          for i in {1..30}; do curl -sSf http://localhost:3000 && break || sleep 1; done
        shell: bash

      - name: Run Playwright tests
        run: npm run test:e2e
